name: Secret Check

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Scan for secrets
        run: |
          if grep -r "password\|secret\|api_key" .; then
            echo "❌ Potential secret detected"
            exit 1
          fi