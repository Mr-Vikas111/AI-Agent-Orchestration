name: Secret Check

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Scan for secrets
        run: |
          if grep -rE \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude="*.md" \
            "(password|secret|api_key)\s*=\s*['\"][^'\"]{8,}" .; then
            echo "❌ Potential secret detected"
            exit 1
          fi
          echo "✅ No hardcoded secrets found"